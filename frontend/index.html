<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>医疗报告管理系统</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <meta name="theme-color" content="#3482FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="医疗管理" />
  </head>
  <body>
    <div id="app-loading" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;font-family:system-ui,sans-serif">
      <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3482FF;border-radius:50%;animation:spin .8s linear infinite"></div>
      <p style="margin-top:16px;color:#64748b;font-size:14px">加载中...</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}@media(prefers-color-scheme:dark){#app-loading{background:#0f172a}#app-loading p{color:#94a3b8}#app-loading div:first-child{border-color:#334155;border-top-color:#3482FF}}</style>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
